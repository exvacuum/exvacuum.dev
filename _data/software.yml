- category: "Games"
  entries:
    - title: "Moose Tracks"
      brief: "A short hike through the woods at night."
      full: "This game was made over the course of 3 days for the Conestoga College VARLab's 2022 Unity Workshop, where I learned the ropes of the Unity engine. My final product recieved an award for \"Most Ambitious Starting Goal\". When I set out to create this project, I wanted to create an immersive experience that subverted players' expectations in a positive way. I believe this project was very successful, and if you decide to play it for yourself, I'm sure you'll agree."
